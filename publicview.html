<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Dashboard — มุมมองสาธารณะ</title>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{ box-sizing:border-box; }
body{ margin:0; min-height:100vh; font-family:'Anuphan', sans-serif; color:white;
  background:linear-gradient(135deg, #0b3d2e 0%, #0f5c46 35%, #0e6b63 65%, #134e5e 100%); background-attachment:fixed; }
.hidden{ display:none !important; }
.container{ max-width:1500px; margin:auto; padding:40px; }
.glass{ background:rgba(255,255,255,0.12); backdrop-filter:blur(10px); border-radius:25px; box-shadow:0 15px 40px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.08); }
.header{ display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:22px; flex-wrap:wrap; text-align:center; }
.brand-icon{ font-size:34px; }
.station-name{ font-size:30px; font-weight:800; background:rgba(0,0,0,0.35); padding:10px 24px; border-radius:40px; text-shadow:0 4px 15px rgba(0,0,0,0.6); }
.public-badge{ text-align:center; font-size:13px; opacity:0.75; margin-bottom:22px; }
.grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:22px; }
.card{ padding:28px; min-height:200px; display:flex; flex-direction:column; justify-content:space-between; position:relative; }
.card-head{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
.card-icon{ font-size:26px; }
.card-label{ font-size:19px; font-weight:700; }
.big{ font-size:56px; font-weight:700; line-height:1; }
.small{ font-size:18px; opacity:0.9; }
.soil-bar-track{ width:100%; height:20px; background:rgba(255,255,255,0.2); border-radius:20px; overflow:hidden; margin-top:10px; }
.soil-bar-fill{ height:100%; border-radius:20px; background:linear-gradient(90deg,#8d6e63,#2196f3); transition:width 0.6s ease; }
.status-badge{ font-size:18px; font-weight:800; padding:8px 22px; border-radius:30px; letter-spacing:1px; display:inline-block; }
.status-on{ background:#00e400; color:#093; }
.status-off{ background:rgba(255,255,255,0.25); color:#eee; }
.chart-trigger{ position:absolute; bottom:14px; right:14px; width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.18); border:none; color:white; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.chart-trigger:hover{ background:rgba(255,255,255,0.32); }
.datetime-card #dateDisplay{ font-size:16px; opacity:0.85; }
.datetime-card #timeDisplay{ font-size:48px; font-weight:700; }
.overlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:30; display:none; align-items:center; justify-content:center; padding:20px; }
.overlay.open{ display:flex; }
.panel{ background:#0e2b24; border-radius:22px; padding:24px 28px; width:640px; max-width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.6); }
.chart-canvas-wrap{ position:relative; height:280px; }
.chart-loading-text{ font-size:13px; opacity:0.7; margin-top:8px; text-align:center; }
.icon-btn{ width:36px; height:36px; border-radius:50%; border:none; background:rgba(0,0,0,0.35); color:white; font-size:16px; cursor:pointer; }
.credit{ position:fixed; bottom:16px; right:24px; z-index:3; background:rgba(0,0,0,0.4); padding:8px 18px; border-radius:60px; font-size:13px; opacity:0.85; }
.center-msg{ text-align:center; padding:80px 20px; }
.center-msg .emoji{ font-size:50px; margin-bottom:14px; }
</style>
</head>
<body>

<div class="container">
  <div id="loadingMsg" class="center-msg">
    <div class="emoji">🛰️</div>
    <div>กำลังโหลดแดชบอร์ด...</div>
  </div>

  <div id="notFoundMsg" class="center-msg glass hidden">
    <div class="emoji">🔒</div>
    <div style="font-size:18px; font-weight:700; margin-bottom:6px;">ไม่พบแดชบอร์ดนี้</div>
    <div style="opacity:0.75; font-size:14px;">ลิงก์นี้อาจไม่ถูกต้อง หรือเจ้าของปิดการแชร์แบบสาธารณะไปแล้ว</div>
  </div>

  <div id="content" class="hidden">
    <div class="header">
      <div class="brand-icon">🛰️</div>
      <div class="station-name" id="stationTitle">แดชบอร์ด</div>
    </div>
    <div class="public-badge">👁️ มุมมองสาธารณะ (อ่านอย่างเดียว) — ข้อมูลเรียลไทม์จากเจ้าของแดชบอร์ด</div>
    <div class="grid" id="fieldsGrid"></div>
  </div>
</div>

<div class="overlay" id="chartOverlay">
  <div class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <h3 id="chartTitle" style="margin:0; font-size:20px;">กราฟย้อนหลัง</h3>
      <button class="icon-btn" id="btnCloseChart">✕</button>
    </div>
    <div class="chart-canvas-wrap"><canvas id="historyChartCanvas"></canvas></div>
    <div class="chart-loading-text" id="chartLoadingText">กำลังโหลดข้อมูล...</div>
  </div>
</div>

<div class="credit">🛰️ IoT Dashboard · powered by Supabase + ThingSpeak</div>

<script>
const SUPABASE_URL = "https://euhbpcwzwljwvrhkvvqi.supabase.co/rest/v1/";       
const SUPABASE_ANON_KEY = "sb_publishable_KCsq29eQ4Ijx3h_QN3WVjA_z4pQewQ5"; 

function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

async function main(){
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("u");
  const loadingMsg = document.getElementById("loadingMsg");
  const notFoundMsg = document.getElementById("notFoundMsg");
  const content = document.getElementById("content");

  if(!slug || SUPABASE_URL.startsWith("YOUR_")){
    loadingMsg.classList.add("hidden");
    notFoundMsg.classList.remove("hidden");
    return;
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data, error } = await sb.from("dashboards").select("*").eq("share_slug", slug).eq("is_public", true).maybeSingle();

  if(error || !data){
    loadingMsg.classList.add("hidden");
    notFoundMsg.classList.remove("hidden");
    return;
  }

  loadingMsg.classList.add("hidden");
  content.classList.remove("hidden");

  const dashboard = data;
  document.getElementById("stationTitle").innerText = dashboard.station_name || "แดชบอร์ด";
  if(dashboard.background_url){
    document.body.style.background = `url('${dashboard.background_url}') no-repeat center center fixed`;
    document.body.style.backgroundSize = "cover";
  }

  function clockHTML(){
    return `<div class="glass card">
      <div class="card-head"><span class="card-icon">🕒</span><span class="card-label">วันที่ &amp; เวลา</span></div>
      <div><div id="dateDisplay" class="small"></div><div id="timeDisplay" style="font-size:48px; font-weight:700;"></div></div>
    </div>`;
  }
  function updateClock(){
    const now = new Date();
    const d = document.getElementById("dateDisplay");
    const t = document.getElementById("timeDisplay");
    if(d) d.innerText = now.toLocaleDateString("th-TH",{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    if(t) t.innerText = now.toLocaleTimeString("th-TH",{hour:'2-digit',minute:'2-digit'});
  }
  setInterval(updateClock, 1000);

  function fieldCardHTML(f){
    if(f.type === "status"){
      return `<div class="glass card" data-field-id="${f.id}">
        <div class="card-head"><span class="card-icon">${f.icon||"⚙️"}</span><span class="card-label">${escapeHtml(f.label)}</span></div>
        <div><span class="status-badge status-off" id="val-${f.id}">--</span></div>
        <button class="chart-trigger" data-chart-for="${f.id}">📈</button>
      </div>`;
    }
    if(f.type === "gauge"){
      return `<div class="glass card" data-field-id="${f.id}">
        <div class="card-head"><span class="card-icon">${f.icon||"📊"}</span><span class="card-label">${escapeHtml(f.label)}</span></div>
        <div><div class="big" id="val-${f.id}">-- ${escapeHtml(f.unit||"")}</div>
        <div class="soil-bar-track"><div class="soil-bar-fill" id="bar-${f.id}" style="width:0%"></div></div></div>
        <button class="chart-trigger" data-chart-for="${f.id}">📈</button>
      </div>`;
    }
    return `<div class="glass card" data-field-id="${f.id}">
      <div class="card-head"><span class="card-icon">${f.icon||"📟"}</span><span class="card-label">${escapeHtml(f.label)}</span></div>
      <div class="big" id="val-${f.id}">-- ${escapeHtml(f.unit||"")}</div>
      <button class="chart-trigger" data-chart-for="${f.id}">📈</button>
    </div>`;
  }

  const fieldsGrid = document.getElementById("fieldsGrid");
  function renderGrid(){
    const fields = (dashboard.fields || []).filter(f => f.enabled);
    let html = clockHTML();
    if(fields.length === 0){
      html += `<div class="glass" style="grid-column:1/-1; text-align:center; padding:50px 20px;">เจ้าของแดชบอร์ดนี้ยังไม่ได้เพิ่มการ์ดข้อมูล</div>`;
    } else {
      html += fields.map(fieldCardHTML).join("");
    }
    fieldsGrid.innerHTML = html;
    updateClock();
    fieldsGrid.querySelectorAll("[data-chart-for]").forEach(btn => {
      btn.addEventListener("click", () => openHistoryChart(btn.getAttribute("data-chart-for")));
    });
  }
  renderGrid();

  function renderFieldValue(f, value){
    const valEl = document.getElementById("val-" + f.id);
    if(!valEl) return;
    if(f.type === "status"){
      const isOn = value !== null && value >= 1;
      valEl.innerText = value === null ? "--" : (isOn ? "ทำงาน (ON)" : "ปิด (OFF)");
      valEl.classList.toggle("status-on", isOn);
      valEl.classList.toggle("status-off", !isOn);
      return;
    }
    if(value === null || isNaN(value)){
      valEl.innerText = "-- " + (f.unit||"");
    } else {
      const shown = Number.isInteger(value) ? value : value.toFixed(1);
      valEl.innerText = shown + " " + (f.unit||"");
    }
    if(f.type === "gauge"){
      const barEl = document.getElementById("bar-" + f.id);
      const min = Number(f.min ?? 0), max = Number(f.max ?? 100);
      let pct = value === null || isNaN(value) ? 0 : ((value - min) / (max - min)) * 100;
      pct = Math.max(0, Math.min(100, pct));
      if(barEl) barEl.style.width = pct + "%";
    }
  }

  async function fetchLiveData(){
    const channel = dashboard.thingspeak_channel;
    const readKey = dashboard.thingspeak_read_key;
    if(!channel || !readKey) return;
    try{
      const res = await fetch(`https://api.thingspeak.com/channels/${channel}/feeds/last.json?api_key=${readKey}`);
      const data2 = await res.json();
      (dashboard.fields || []).filter(f => f.enabled).forEach(f => {
        const raw = data2[f.tsField];
        const value = raw === null || raw === undefined || raw === "" ? null : parseFloat(raw);
        renderFieldValue(f, value);
      });
    } catch(err){ console.error(err); }
  }
  fetchLiveData();
  setInterval(fetchLiveData, 16000);

  let historyChart = null;
  const chartOverlay = document.getElementById("chartOverlay");
  document.getElementById("btnCloseChart").addEventListener("click", () => chartOverlay.classList.remove("open"));
  chartOverlay.addEventListener("click", (e) => { if(e.target === chartOverlay) chartOverlay.classList.remove("open"); });

  async function openHistoryChart(fieldId){
    const f = (dashboard.fields || []).find(x => x.id === fieldId);
    if(!f) return;
    chartOverlay.classList.add("open");
    const loadingText = document.getElementById("chartLoadingText");
    loadingText.style.display = "block";
    loadingText.innerText = "กำลังโหลดข้อมูล...";
    document.getElementById("chartTitle").innerText = `${f.icon||""} ${f.label} ย้อนหลัง 24 ชม.`;
    try{
      const res = await fetch(`https://api.thingspeak.com/channels/${dashboard.thingspeak_channel}/feeds.json?api_key=${dashboard.thingspeak_read_key}&days=1`);
      const data2 = await res.json();
      const feeds = data2.feeds || [];
      const labels = feeds.map(x => new Date(x.created_at).toLocaleTimeString("th-TH",{hour:'2-digit',minute:'2-digit'}));
      const values = feeds.map(x => x[f.tsField] !== null && x[f.tsField] !== undefined ? parseFloat(x[f.tsField]) : null);
      if(historyChart) historyChart.destroy();
      const ctx = document.getElementById("historyChartCanvas").getContext("2d");
      historyChart = new Chart(ctx, {
        type: "line",
        data: { labels, datasets: [{ label: `${f.label} (${f.unit||""})`, data: values,
          borderColor: "#42a5f5", backgroundColor: "rgba(66,165,245,0.12)", tension: 0.35, pointRadius: 0, borderWidth: 2.5, fill: true }]},
        options: { responsive:true, maintainAspectRatio:false, interaction:{mode:"index", intersect:false},
          plugins:{ legend:{ labels:{ color:"#fff", font:{family:"Anuphan"} } } },
          scales:{ x:{ ticks:{ color:"#ddd", maxTicksLimit:6 }, grid:{ color:"rgba(255,255,255,0.08)" } },
                    y:{ ticks:{ color:"#ddd" }, grid:{ color:"rgba(255,255,255,0.08)" } } } }
      });
      loadingText.style.display = "none";
    } catch(err){
      loadingText.innerText = "โหลดข้อมูลกราฟไม่สำเร็จ";
      console.error(err);
    }
  }
}
main();
</script>
</body>
</html>
